// Teil 2 ergänzt Rechenlogik, Generator, Prüfen und Lösungen.

// ------------------------------
// Bruchfunktionen
// ------------------------------

function ggt(a, b) {
    a = Math.abs(a);
    b = Math.abs(b);

    while (b !== 0) {
        let h = b;
        b = a % b;
        a = h;
    }

    return a;
}

function kuerzen(z, n) {

    if (n < 0) {
        z *= -1;
        n *= -1;
    }

    const g = ggt(z, n);

    return {
        z: z / g,
        n: n / g
    };
}

function add(b1, b2) {

    return kuerzen(
        b1.z * b2.n + b2.z * b1.n,
        b1.n * b2.n
    );

}

function sub(b1, b2) {

    return kuerzen(
        b1.z * b2.n - b2.z * b1.n,
        b1.n * b2.n
    );

}

function mul(b1, b2) {

    return kuerzen(
        b1.z * b2.z,
        b1.n * b2.n
    );

}

function divi(b1, b2) {

    return kuerzen(
        b1.z * b2.n,
        b1.n * b2.z
    );

}

// Für Subtraktion meist negatives Ergebnis erzeugen
if (bruch1.z * bruch2.n > bruch2.z * bruch1.n) {

// ------------------------------

function leseBruch(text) {

    text = text.replace(/\s/g, "");

    // Ganze Zahl?
    if (!text.includes("/")) {

        const z = parseInt(text);

        if (isNaN(z))
            return null;

        return { z:z, n:1 };
    }

    const teile = text.split("/");

    if (teile.length !== 2)
        return null;

    const z = parseInt(teile[0]);
    const n = parseInt(teile[1]);

    if (isNaN(z) || isNaN(n) || n === 0)
        return null;

    return { z, n };
}


// ------------------------------
// Ergebnis vergleichen
// ------------------------------

function pruefeAntwort(eingabe, loesung) {

    if (eingabe === null)
        return "falsch";

    // mathematisch gleich?

    if (eingabe.z * loesung.n !== loesung.z * eingabe.n)
        return "falsch";

    const g = ggt(eingabe.z, eingabe.n);

    if (g === 1)
        return "perfekt";

    return "kuerzen";

}

function markiere(input, status) {

    input.style.color = "black";

    if (status === "perfekt") {

        input.style.background = "#c8e6c9";

    }

    else if (status === "kuerzen") {

        input.style.background = "#fff59d";

    }

    else {

        input.style.background = "#ffcdd2";

    }

}

    felder.forEach(f => {

        const status = pruefeAntwort(eingabe, f.loesung);

        markiere(f.input, status);

        if (status === "perfekt")
            richtig++;

    });

    if (richtig === 4) {

jubel();

    const l3 = mul(bruch1, bruch2);
    const l4 = divi(bruch1, bruch2);

    function ausgabe(b){

    // Ergebnisse

    document.getElementById("geteilt2").value =
        (bruch1.z*bruch2.n)+"/"+(bruch1.n*bruch2.z);

function kgV(a,b){
    return a*b/ggt(a,b);
}

// -----------------------

// -----------------------

let h = kgV(bruch1.n, bruch2.n);

let e1 = bruch1.z * (h / bruch1.n);
let e2 = bruch2.z * (h / bruch2.n);

document.getElementById("plus1").value =

document.getElementById("minus1").value =

document.getElementById("minus2").value =

function pizzaSVG(zaehler, nenner){

    const r = 80;
    const cx = 90;
    const cy = 90;

    let svg = `
<svg class="pizzaSVG" viewBox="0 0 180 180">

<circle cx="${cx}" cy="${cy}" r="${r}"
fill="#f7d774"
stroke="#8d5a00"
stroke-width="3"/>
`;

    for(let i=0;i<nenner;i++){

        const a1 = -Math.PI/2 + i*2*Math.PI/nenner;
        const a2 = -Math.PI/2 + (i+1)*2*Math.PI/nenner;

        const x1 = cx + r*Math.cos(a1);
        const y1 = cy + r*Math.sin(a1);

        const x2 = cx + r*Math.cos(a2);
        const y2 = cy + r*Math.sin(a2);

        const gross = (a2-a1)>Math.PI ? 1 : 0;

        if(i<zaehler){

            svg += `
<path
d="M ${cx} ${cy}
L ${x1} ${y1}
A ${r} ${r} 0 ${gross} 1 ${x2} ${y2}
Z"
fill="#e53935"
stroke="#8d5a00"
stroke-width="2"/>
`;

        }

        svg += `
<line
x1="${cx}"
y1="${cy}"
x2="${x1}"
y2="${y1}"
stroke="#8d5a00"
stroke-width="2"/>
`;

    }

    svg += `
<text
x="90"
y="172"
font-size="22"
text-anchor="middle"
font-weight="bold">
${zaehler}/${nenner}
</text>

</svg>`;

    return svg;

}

function pizzaBlock(titel,z,n){

    return `
    <div class="pizzaKarte">

        <div style="
            font-weight:bold;
            margin-bottom:10px;
        ">
            ${titel}
        </div>

        ${pizzaSVG(z,n)}

    </div>`;
}

function pizzaZeile(...elemente){

    return `
        <div class="pizzaZeile">
            ${elemente.join('<div class="pfeil">➜</div>')}
        </div>
    `;
}
