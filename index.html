<script>
document.getElementById("jahr").textContent=new Date().getFullYear();
let stufe="leicht";

const texte={

de:{
titel:"Bruchrechnen",
pruefen:"✓ Prüfen",
loesung:"💡 Lösungen",
neu:"🔄 Neue Brüche",
leicht:"😊 Leicht",
mittel:"🧠 Mittel",
schwer:"🔥 Schwer"
},

en:{
titel:"Fraction Arithmetic",
pruefen:"✓ Check",
loesung:"💡 Show answers",
neu:"🔄 New fractions",
leicht:"😊 Easy",
mittel:"🧠 Medium",
schwer:"🔥 Hard"
},

es:{
titel:"Fracciones",
pruefen:"✓ Comprobar",
loesung:"💡 Soluciones",
neu:"🔄 Nuevas fracciones",
leicht:"😊 Fácil",
mittel:"🧠 Medio",
schwer:"🔥 Difícil"
}

};


function sprache(s){

document.getElementById("titel").textContent=texte[s].titel;

document.getElementById("pruefen").textContent=texte[s].pruefen;
document.getElementById("loesung").textContent=texte[s].loesung;
document.getElementById("neu").textContent=texte[s].neu;

document.getElementById("btnLeicht").textContent=texte[s].leicht;
document.getElementById("btnMittel").textContent=texte[s].mittel;
document.getElementById("btnSchwer").textContent=texte[s].schwer;

}



// Teil 2 ergänzt Rechenlogik, Generator, Prüfen und Lösungen.

// ------------------------------
// Bruchfunktionen
// ------------------------------

function ggt(a, b) {
    a = Math.abs(a);
    b = Math.abs(b);

    while (b !== 0) {
        let h = b;
        b = a % b;
        a = h;
    }

    return a;
}

function kuerzen(z, n) {

    if (n < 0) {
        z *= -1;
        n *= -1;
    }

    const g = ggt(z, n);

    return {
        z: z / g,
        n: n / g
    };
}

function add(b1, b2) {

    return kuerzen(
        b1.z * b2.n + b2.z * b1.n,
        b1.n * b2.n
    );

}

function sub(b1, b2) {

    return kuerzen(
        b1.z * b2.n - b2.z * b1.n,
        b1.n * b2.n
    );

}

function mul(b1, b2) {

    return kuerzen(
        b1.z * b2.z,
        b1.n * b2.n
    );

}

function divi(b1, b2) {

    return kuerzen(
        b1.z * b2.n,
        b1.n * b2.z
    );

}


const leicht = [

{z1:1,n1:2,z2:1,n2:4},
{z1:2,n1:5,z2:1,n2:5},
{z1:3,n1:8,z2:1,n2:8},
{z1:3,n1:4,z2:1,n2:4},
{z1:2,n1:3,z2:1,n2:3},
{z1:4,n1:5,z2:1,n2:5}

];

const mittel = [

{z1:2,n1:5,z2:1,n2:3},
{z1:3,n1:4,z2:5,n2:6},
{z1:4,n1:9,z2:2,n2:3},
{z1:5,n1:8,z2:1,n2:6},
{z1:7,n1:10,z2:3,n2:5},
{z1:5,n1:12,z2:1,n2:4}

];

const schwer = [

{z1:7,n1:12,z2:5,n2:18},
{z1:11,n1:15,z2:7,n2:10},
{z1:13,n1:20,z2:9,n2:14},
{z1:9,n1:16,z2:11,n2:24},
{z1:7,n1:18,z2:5,n2:12},
{z1:11,n1:24,z2:13,n2:30}

];

let bruch1;
let bruch2;

function jubel(){

const elefant=document.getElementById("elefant");
elefant.style.display="block";

const farben=[
"#e53935",
"#43a047",
"#1e88e5",
"#fdd835",
"#8e24aa",
"#fb8c00"
];

for(let i=0;i<120;i++){

const k=document.createElement("div");
k.className="konfetti";

k.style.left=Math.random()*100+"vw";
k.style.background=farben[Math.floor(Math.random()*farben.length)];
k.style.animationDelay=Math.random()+"s";

document.body.appendChild(k);

setTimeout(()=>k.remove(),4000);

}

setTimeout(()=>{

elefant.style.display="none";

},3500);

}

function neueBrueche() {

    let liste;

    if (stufe === "leicht")
        liste = leicht;

    if (stufe === "mittel")
        liste = mittel;

    if (stufe === "schwer")
        liste = schwer;

    const p = liste[Math.floor(Math.random()*liste.length)];

    bruch1 = {
        z:p.z1,
        n:p.n1
    };

    bruch2 = {
        z:p.z2,
        n:p.n2
    };


 function bruchHTML(z,n){
return `
<div class="bruch-klein">
<div>${z}</div>
<div class="strich"></div>
<div>${n}</div>
</div>`;
}

document.getElementById("plusText").innerHTML =
bruchHTML(bruch1.z,bruch1.n)+" + "+
bruchHTML(bruch2.z,bruch2.n)+" =";

document.getElementById("minusText").innerHTML =
bruchHTML(bruch1.z,bruch1.n)+" − "+
bruchHTML(bruch2.z,bruch2.n)+" =";

document.getElementById("malText").innerHTML =
bruchHTML(bruch1.z,bruch1.n)+" × "+
bruchHTML(bruch2.z,bruch2.n)+" =";

document.getElementById("geteiltText").innerHTML =
bruchHTML(bruch1.z,bruch1.n)+" ÷ "+
bruchHTML(bruch2.z,bruch2.n)+" =";

document.querySelectorAll("input").forEach(f => {
    f.value = "";
    f.style.background = "white";
    f.style.color = "black";
});

}

// ------------------------------
// Benutzereingabe lesen
// ------------------------------

function leseBruch(text) {

    text = text.replace(/\s/g, "");

    const teile = text.split("/");

    if (teile.length !== 2)
        return null;

    const z = parseInt(teile[0]);
    const n = parseInt(teile[1]);

    if (isNaN(z) || isNaN(n) || n === 0)
        return null;

    return { z, n };
}

// ------------------------------
// Ergebnis vergleichen
// ------------------------------

function pruefeAntwort(eingabe, loesung) {

    if (eingabe === null)
        return "falsch";

    // mathematisch gleich?

    if (eingabe.z * loesung.n !== loesung.z * eingabe.n)
        return "falsch";

    const g = ggt(eingabe.z, eingabe.n);

    if (g === 1)
        return "perfekt";

    return "kuerzen";

}

// ------------------------------
// Farbe setzen
// ------------------------------

function markiere(input, status) {

    input.style.color = "black";

    if (status === "perfekt") {

        input.style.background = "#c8e6c9";

    }

    else if (status === "kuerzen") {

        input.style.background = "#fff59d";

    }

    else {

        input.style.background = "#ffcdd2";

    }

}

document.getElementById("pruefen").onclick = function () {

    const ergPlus = add(bruch1, bruch2);
    const ergMinus = sub(bruch1, bruch2);
    const ergMal = mul(bruch1, bruch2);
    const ergGeteilt = divi(bruch1, bruch2);

    const felder = [
        {
            input: document.getElementById("plus"),
            loesung: ergPlus
        },
        {
            input: document.getElementById("minus"),
            loesung: ergMinus
        },
        {
            input: document.getElementById("mal"),
            loesung: ergMal
        },
        {
            input: document.getElementById("geteilt"),
            loesung: ergGeteilt
        }
    ];

    let richtig = 0;

    felder.forEach(f => {

        const eingabe = leseBruch(f.input.value);

        const status = pruefeAntwort(eingabe, f.loesung);

        markiere(f.input, status);

        if (status === "perfekt")
            richtig++;

    });

    if (richtig === 4) {

jubel();

        // Hier kommt später der Jubel-Elefant.

    }

};

document.getElementById("loesung").onclick = function () {

    const l1 = add(bruch1, bruch2);
    const l2 = sub(bruch1, bruch2);
    const l3 = mul(bruch1, bruch2);
    const l4 = divi(bruch1, bruch2);

    document.getElementById("plus").value =
        l1.z + "/" + l1.n;

    document.getElementById("minus").value =
        l2.z + "/" + l2.n;

    document.getElementById("mal").value =
        l3.z + "/" + l3.n;

    document.getElementById("geteilt").value =
        l4.z + "/" + l4.n;

document.querySelectorAll("input").forEach(f=>{
    f.style.background="#c8e6c9";
});

};

document.getElementById("neu").onclick = function () {

    neueBrueche();

};

neueBrueche();


</script>
